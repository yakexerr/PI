<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <title>Доска</title>
        <link rel="stylesheet" href="../styles/styles.css">
    </head>
    <body>
        <div class="app-container">
            <aside class="sidebar" id="sidebar">
                <div class="logo">
                    <img src="../assets/logotype.png" alt="logo">
                    <span>Task system</span>
                </div>

                <div class="custom-dropdown">
                    <div class="dropdown-trigger" onclick="toggleDropdown()">
                        <span>Проекты</span>
                        <span class="arrow">▼</span>
                    </div>
                    <div class="dropdown-menu" id="projectMenu">
                        <!-- Контейнер ТОЛЬКО для списка проектов из базы -->
                        <div id="dynamic-project-list"></div>
                        <!-- Статичная кнопка, которую мы никогда не трогаем -->
                        <a href="#" class="create-project-btn" >+ Создать проект</a>
                    </div>
                </div>

                <div id="projectList"></div> 

                <ul class="side-links">
                    <li><a href="profilePage.html">Профиль</a></li>
                </ul>
            </aside>
            <div class="main-content">
                <header class="navbar">
                    <ul class="nav-links">
                        <li><a href="tasksPage.html">Доска</a></li>
                        <li><a href="backlogsPage.html">Бэклог</a></li>
                    </ul>
                </header>
                <main>
                    <h1 class="task-h1">Задачи</h1>
                    

                    <div class="kanban-board">
                        <div class="kanban-column" id="col-todo">
                            <h2>Нужно сделать</h2>
                            <ul class="task-list"></ul>
                        </div>
                        <div class="kanban-column" id="col-progress">
                            <h2>В работе</h2>
                            <ul class="task-list"></ul>
                        </div>
                        <div class="kanban-column" id="col-testing">
                            <h2>Тестируется</h2>
                            <ul class="task-list"></ul>
                        </div>
                        <div class="kanban-column" id="col-done">
                            <h2>Готово</h2>
                            <ul class="task-list"></ul>
                        </div>
                    </div>

                    
                    
                    <!-- <ul id="taskList"></ul> -->
                </main>
                <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
                <script src="../scripts/tasks.js"></script>
            </div>
        </div>
         <script src="../scripts/sidebar.js"></script>
         <script src="/scripts/dropdown_menu.js"></script>
         <dialog id="projectDialog">
            <form id="projectFormDialog">
                <p>Создать новый проект:</p>
                <input type="text" id="projectName" placeholder="Название проекта" required>
                <input type="text" id="projectDesc" placeholder="Описание">
                <div>
                    <button type="submit">Создать</button>
                    <button type="button" onclick="document.getElementById('projectDialog').close()">Отмена</button>
                </div>
            </form>
        </dialog>

        <dialog id="renameDialog" style="border-radius: 10px; border: none; padding: 20px; width: 320px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
            <form id="renameForm">
                <p style="font-weight: bold; margin-top: 0; margin-bottom: 15px; color: #333;" id="renameDialogTitle">Переименовать</p>
                <input type="hidden" id="renameItemId">
                <input type="hidden" id="renameItemType">
                <input type="text" id="renameInput" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; margin-bottom: 15px;">
                <div style="display: flex; justify-content: space-between;">
                    <button type="submit" class="sprint-createform-btn">Сохранить</button>
                    <button type="button" class="sprint-cancelform-btn" onclick="document.getElementById('renameDialog').close()">Отмена</button>
                </div>
            </form>
        </dialog>
    </body>

</html>
