<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="../styles/styles.css">
    </head>
    <body>
        <header>
            <nav class="navbar">
                <a href="homePage.html" class="logo-link">
                    <div class="logo">
                        <img src="../assets/logo.png" alt="logo">
                        <span>task system</span>
                    </div>
                </a>
                <ul class="nav-links">
                    <!-- <li><a href="homePage.html" class="active">Главная</a></li> -->
                    <li><a href="tasksPage.html" class="active">Задачи</a></li>
                    <li class="auth-link"><a href="profilePage.html">Профиль</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <h1 class="task-h1">Задачи</h1>
            <form id="taskForm"> 
                <div id="taskNameInput">
                    <input type="text" id="taskTitle" placeholder="Название задачи" required>
                    <select id="taskPriority">
                        <option value="Высокий">Высокий</option>
                        <option value="Средний" selected>Средний</option>
                        <option value="Низкий">Низкий</option>
                    </select>
                    <button type="submit" id="addTaskButton">Добавить задачу</button>
                </div> 
            </form>
            
            <!-- место для сообщений об ошибках/успехе -->
            <div class="msgdiv">
                <span id="message"></span>
            </div>
            

            <div class="kanban-board">
                <div class="kanban-column" id="col-todo">
                    <h2>Нужно сделать</h2>
                    <ul class="task-list"></ul>
                </div>
                <div class="kanban-column" id="col-progress">
                    <h2>В работе</h2>
                    <ul class="task-list"></ul>
                </div>
                <div class="kanban-column" id="col-done">
                    <h2>Готово</h2>
                    <ul class="task-list"></ul>
                </div>
            </div>

            
            
            <!-- <ul id="taskList"></ul> -->
        </main>
        <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
        <script src="../scripts/tasks.js"></script>
    </body>

</html>
