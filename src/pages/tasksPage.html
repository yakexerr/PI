<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="../styles/styles.css">
    </head>
    <body>
        <header>
            <nav class="navbar">
                <ul class="nav-links">
                    <li><a href="homePage.html">Главная</a></li>
                    <li><a href="tasksPage.html">Задачи</a></li>
                    <li class="auth-link"><a href="profilePage.html">Профиль</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <h1>Задачи</h1>
            <form id="taskForm"> 
                <input type="text" id="taskTitle" placeholder="Название задачи" required>
                <select id="taskPriority">
                    <option value="Высокий">Высокий</option>
                    <option value="Средний" selected>Средний</option>
                    <option value="Низкий">Низкий</option>
                </select>
                <button type="submit" id="addTask">Добавить задачу</button>
            </form>
            
            <!-- место для сообщений об ошибках/успехе -->
            <span id="message"></span>
            
            <ul id="taskList"></ul>
        </main>
        <script src="../scripts/tasks.js"></script>
    </body>

</html>
