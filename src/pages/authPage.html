<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Просмотр</title>
    <link rel="stylesheet" href="/styles/styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <ul class="nav-links">
                <li><a href="unautirizPage.html">Главная</a></li>
                
                <li class="auth-link"><a href="registrationPage.html">Регистрация</a></li>
            </ul>
        </nav>
    </header>

    <main class="center-container">
        <div class="auth-card">
            <h1>Авторизация</h1>
            <form id="loginForm">
                <div class="input-group">
                    <label for="login">Логин</label>
                    <input type="text" id="username" placeholder="Введите логин">
                    
                </div>
                <div class="input-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" placeholder="Введите пароль">
                </div>
                <button type="submit" class="btn-submit">Войти</button>
                <div id="message"></div>
                <p class="form-footer">Ещё нет аккаунта? <a href="registrationPage.html">Регистрация</a></p>
            </form>
        </div>
    </main>
    <script src="/scripts/auth.js"></script>
</body>
</html>
