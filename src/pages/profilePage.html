<!DOCTYPE html>
<html lang="ru">
    <head>
        <link rel="stylesheet" href="../styles/styles.css">
        <meta charset="UTF-8">
        <title>Профиль</title>
    </head>
    <body>
        <div class="app-container">
             <aside class="sidebar">
                <div class="logo">
                    <img src="../assets/logotype.png" alt="logo">
                    <span>Task system</span>
                </div>

                <div class="custom-dropdown">
                    <div class="dropdown-trigger" onclick="toggleDropdown()">
                        <span>Проекты</span>
                        <span class="arrow">▼</span>
                    </div>
                    <div class="dropdown-menu" id="projectMenu">
                        <a href="tasksPage.html">Проект 1</a>
                        <a href="tasksPage.html">Проект 2</a>
                    </div>
                </div>

                <ul class="side-links">
                    <li><a href="profilePage.html">Профиль</a></li>
                </ul>
            </aside>
            <div class="main-content">
                <main>
                    <h1>Профиль</h1>
                    <img src="/assets/trut.jpg" alt="Фото профиля" style="border-radius: 50%; width: 150px; height: 150px; object-fit: cover;" >
                    <div class="profile-info">
                        <p>Имя: <span id="p-name">Загрузка...</span></p>
                        <p>Фамилия: <span id="p-lastname">Загрузка...</span></p>
                        <p>Дата рождения: <span id="p-birthDate">Загрузка...</span></p>
                        <p>Роль: <span id="p-role">Загрузка...</span></p>
                    </div>
                    <div class="center-content">
                        <button id="logout-button">Выйти</button>
                    </div>
                    <script src="/scripts/profile.js"></script>
                    <script src="/scripts/logout.js"></script>
                    <script src="/scripts/dropdown_menu.js"></script>
                </main>
            </div>
        </div>
    </body>
</html>
